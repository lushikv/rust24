services:
  postgres:
    image: postgres:16
    container_name: rust24-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rust24
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rust24-postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: rust24-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rust24-redis-data:/data

volumes:
  rust24-postgres-data:
  rust24-redis-data:
